<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--=============== FAVICON ===============-->
    <link
      rel="shortcut icon"
      href="assets/img/favicon.png"
      type="image/x-icon"
    />

    <!--=============== REMIXICONS ===============-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
    />

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="/amirPortfolio/dr-zahabi/assets/css/style.css" />

    <!--=============== SWIPER CSS ===============-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <!--=============== FONT AWS ===============-->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>Dr. Pegah Zahabi | Aesthetic Medicine</title>
  </head>
  <body>
    <!--=============== HEADER ===============-->

    <header class="header" id="header">
      <nav class="nav container">
        <a href="#" class="nav__logo">
          <img src="./assets/images/logo.png" alt="logo" class="header__logo"> Dr. Pegah
        </a>
        <div class="nav__menu" id="nav--menu">
          <ul class="nav__list">
            <li><a href="#home" class="nav__link">صفحه اصلی</a></li>
            <li><a href="#services" class="nav__link">خدمات</a></li>
            <li><a href="#about" class="nav__link">درباره دکتر ذهابی</a></li>
            <li><a href="#gallery" class="nav__link">گالری</a></li>
            <li><a href="#contact" class="nav__link">تماس و رزرو وقت</a></li>
          </ul>

          <!-- Close Btn -->
          <div class="nav__close" id="nav-close">
            <i class="fa-solid fa-xmark"></i>
          </div>
        </div>
        <div class="nav__buttons">
          <!-- Theme Button  -->
          <i class="fa-solid fa-moon nav__theme" id="theme-button"></i>
          <div class="nav__toggle" id="nav-toggle">
            <i class="fa-solid fa-bars"></i>
          </div>
        </div>
      </nav>
    </header>
    <!--==================== MAIN ====================-->
    <main class="main">
      <!--==================== HOME ====================-->
      <section class="home section" id="home">
            <video class="home__video" autoplay muted loop playsinline>
        <source src="./assets/video/bg.mp4" type="video/mp4">
    </video>
        <div class="home__container container grid">
          <div class="home__data">
            <h1 class="home__title">
              <span>زیبایی‌ات را</span><br />
              کشف کن
            </h1>
            <p class="home__description">
              تزریق بوتاکس، فیلر و خدمات تخصصی پوست با دکتر پگاه ذهابی
            </p>
            <a href="#contact" class="button">رزرو وقت</a>
          </div>

          <div class="home__content grid">
    <div class="home__image">
        <img src="./assets/images/drPegah.png" alt="Dr. Pegah" class="home__img"/>
    </div>
    
    <div class="home__info">
        <div>
            <h2 class="home__name">دکتر پگاه ذهابی</h2>
            <h3 class="home__profession">متخصص زیبایی و پزشکی زیباشناختی</h3>
            <div class="home__icons">
                <div class="home__box">
                    <i class="fa-solid fa-syringe"></i>
                </div>
                <div class="home__box">
                    <i class="ri-24-hours-line"></i>
                </div>
            </div>
        </div>
    </div>

    <a href="#contact" class="home__button button_dark">
        <i class="fa-solid fa-angle-right"></i>
        ارتباط با ما
    </a>
</div>


          </div>
        </div>
      </section>
      <!--==================== DELIVERY ====================-->
      <section class="delivery section" id="delivery"></section>

      <!--==================== ABOUT ====================-->
      <section class="about section" id="about"></section>

      <!--==================== PRICES ====================-->
      <section class="prices section" id="prices"></section>

      <!--==================== GALLERY ====================-->
      <section class="gallery section"></section>

      <!--==================== CONTACT ====================-->
      <section class="contact section" id="contact"></section>
    </main>

    <!--==================== FOOTER ====================-->
    <footer class="footer"></footer>

    <!--========== SCROLL UP ==========-->
    <!--=============== SCROLLREVEAL ===============-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/scrollReveal.js/4.0.9/scrollreveal.min.js"></script>

    <!--=============== SWIPER JS ===============-->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <!--=============== MAIN JS ===============-->
    <script src="./js/index.js"></script>
  </body>
</html>
